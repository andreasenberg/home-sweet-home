# Modified version of the https://starship.rs/presets/#gruvbox-rainbow preset
# Found here: https://github.com/typecraft-dev/dotfiles/blob/master/starship/.config/starship.toml

"$schema" = 'https://starship.rs/config-schema.json'

format = """
[ΌΓ╢](surface0)\
$username\
[ΌΓ░](bg:peach fg:surface0)\
$directory\
[ΌΓ░](fg:peach bg:green)\
${custom.git_branch}\
${custom.git_status}\
${custom.jj}\
[ΌΓ░](fg:green bg:teal)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[ΌΓ░](fg:teal bg:blue)\
$docker_context\
[ΌΓ░](fg:blue bg:purple)\
$time\
[ΌΓ┤ ](fg:purple)\
$line_break$character"""

