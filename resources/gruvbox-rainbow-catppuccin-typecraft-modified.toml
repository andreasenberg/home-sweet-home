[character]
disabled = false
success_symbol = '[ΎΡ▓](bold fg:green)'
error_symbol = '[ΎΡ▓](bold fg:red)'
vimcmd_symbol = '[ΎΡ┤](bold fg:creen)'
vimcmd_replace_one_symbol = '[ΎΡ┤](bold fg:purple)'
vimcmd_replace_symbol = '[ΎΡ┤](bold fg:purple)'
vimcmd_visual_symbol = '[ΎΡ┤](bold fg:lavender)'


# Based on https://github.com/jj-vcs/jj/wiki/Starship#alternative-prompt
[custom.jj]
description = "The current jj status"
style = "bg:teal"
format = '[[ $symbol $output ](fg:base bg:green)]($style)'
when = "jj --ignore-working-copy root"
symbol = "ΏθξΜ"
command = '''
jj log --revisions @ --no-graph --ignore-working-copy --limit 1 --template '
  separate(" ",
    change_id.shortest(4),
    bookmarks,
    "|",
    concat(
      if(conflict, "ΏθΤξ"),
      if(divergent, "Ώθγπ"),
      if(hidden, "ΏθΣ╗"),
      if(immutable, "ΏθΦΤ"),
    ),
    if(empty, "(empty)"),
    coalesce(
      truncate_end(29, description.first_line(), "έΑο"),
      "(no description set)",
    ),
  )
'
'''

[git_status]
disabled = true

[custom.git_status]
when = "! jj --ignore-working-copy root"
description = "Only show git_status if we're not in a jj repo"
command = "starship module git_status"
style = "bg:teal"
format = '[[($all_status$ahead_behind )](fg:base bg:green)]($style)'


[git_branch]
disabled = true

[custom.git_branch]
when = "! jj --ignore-working-copy root"
description = "Only show git_branch if we're not in a jj repo"
command = "starship module git_branch"
symbol = "ΎΡα"
style = "bg:teal"
format = '[[ $symbol $branch ](fg:base bg:green)]($style)'

[git_metrics]
disabled = true

[git_commit]
disabled = true
